<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidi - Serverin etusivu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hero {
            margin-bottom: 50px;
        }
        h1 {
            color: #00ffcc;
            font-size: 48px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #aaaaaa;
            font-size: 18px;
            margin: 0;
        }

        .box-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .nav-box {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 3px solid transparent;
        }

        .box-ohjeet {
            width: 300px;
            height: 150px;
            background-color: #ffffff;
            border-radius: 10px;
        }
        .box-kauppa {
            width: 350px;
            height: 150px;
            background-color: #00ffcc;
            border-radius: 10px;
        }
        .box-discord {
            width: 400px;
            height: 150px;
            background-color: #ffffff;
            clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
        }

        .nav-box:hover {
            transform: scale(1.05);
            box-shadow: 0px 0px 20px rgba(0, 255, 204, 0.5);
            border-color: #00cc99;
        }
        .box-discord:hover {
            clip-path: polygon(0% 0%, 75% 0%, 100% 100%, 25% 100%);
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Tervetuloa Voidi Serverille!</h1>
        <p>Säännöt, ohjeet ja kauppa löytyvät alta.</p>
    </div>

    <div class="box-container">
        <!-- OHJEET (vaihda linkki tarvittaessa myöhemmin) -->
        <a href="#" class="nav-box box-ohjeet">
            OHJEET
        </a>

        <!-- KAUPPA (vaihda linkki tarvittaessa myöhemmin) -->
        <a href="#" class="nav-box box-kauppa">
            KAUPPA
        </a>

        <!-- DISCORD (linkitetty antamaasi osoitteeseen) -->
        <a href="https://discord.gg/cZ6Ngtau6B" target="_blank" class="nav-box box-discord">
            Discord
        </a>
    </div>

</body>
</html>
