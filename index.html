<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidi - Serverin etusivu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hero-text {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: #00ffcc;
            font-size: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            font-weight: 800;
        }

        p {
            color: #bbbbbb;
            font-size: 18px;
            margin: 0;
            font-weight: 300;
        }

        .box-wrapper {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 20px;
            max-width: 1200px;
        }

        .nav-box {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            width: 260px;
            height: 140px;
            border-radius: 15px;
        }

        .nav-box:hover {
            transform: translateY(-8px);
        }

        /* 1. OHJEET (Valkoinen) */
        .box-ohjeet {
            background-color: #ffffff;
            color: #000000;
        }
        .box-ohjeet:hover {
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        /* 2. SÄÄNNÖT (Turkoosi) */
        .box-saannot {
            background-color: #00ffcc;
            color: #000000;
        }
        .box-saannot:hover {
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.4);
        }

        /* 3. KAUPPA (Tumma/Tyylikäs violetti reunus tai harmaa) */
        .box-kauppa {
            background-color: #1a1a1a;
            color: #00ffcc;
            border: 2px solid #00ffcc;
        }
        .box-kauppa:hover {
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
        }

        /* 4. DISCORD (Valkoinen) */
        .box-discord {
            background-color: #ffffff;
            color: #000000;
        }
        .box-discord:hover {
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 900px) {
            .box-wrapper {
                flex-direction: column;
                gap: 20px;
            }
            h1 { font-size: 32px; }
            .nav-box { width: 90% !important; height: 90px !important; }
        }
    </style>
</head>
<body>

    <div class="hero-text">
        <h1>Tervetuloa Voidi Serverille!</h1>
        <p>Valitse alta haluamasi osio.</p>
    </div>

    <div class="box-wrapper">
        <!-- Ohjeet -->
        <a href="ohjeet.html" class="nav-box box-ohjeet">Ohjeet</a>

        <!-- Säännöt -->
        <a href="saannot.html" class="nav-box box-saannot">Säännöt</a>

        <!-- Kauppa -->
        <a href="kauppa.html" class="nav-box box-kauppa">Kauppa</a>

        <!-- Discord -->
        <a href="https://discord.gg/cZ6Ngtau6B" target="_blank" class="nav-box box-discord">Discord</a>
    </div>

</body>
</html>
